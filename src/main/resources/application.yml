spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format-sql: false

  jackson:
    serialization:
      indent_output: true

server:
  port: ${PORT:8080}
  forward-headers-strategy: framework

jwt:
  secret: ${JWT_SECRET:dev-secret-change-me}
  expiration: ${JWT_EXPIRATION:86400000}

financial:
  threshold:
    expense-increase: ${FINANCIAL_THRESHOLD_EXPENSE_INCREASE:20}
    commitment: ${FINANCIAL_THRESHOLD_COMMITMENT:70}
    projection-months: ${FINANCIAL_THRESHOLD_PROJECTION_MONTHS:3}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs